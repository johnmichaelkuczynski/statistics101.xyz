kind = "web"
previewPath = "/"
title = "Philosophy 101"
version = "1.0.0"
id = "artifacts/phil-101"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24158

[services.development]
run = "pnpm --filter @workspace/phil-101 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/phil-101", "run", "build" ]
publicDir = "artifacts/phil-101/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24158"
BASE_PATH = "/"
